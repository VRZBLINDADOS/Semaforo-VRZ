<style>
*{box-sizing:border-box;-webkit-font-smoothing:antialiased}
:root{
  --red:#DC1F1F;--red-deep:#A81515;--red-light:#FFF0F0;
  --black:#0D0D0D;--ink:#1A1A1A;--smoke:#F7F5F3;--border:#E8E3E0;--muted:#9A9189;

html,body{height:100%}
body{font-family:'Plus Jakarta Sans',sans-serif;margin:0;background:#fff;overflow:hidden;color:var(--ink)}
.mono{font-family:'JetBrains Mono',monospace}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-up{animation:fadeUp .35s cubic-bezier(.22,1,.36,1) forwards}
.fade-in{animation:fadeIn .25s ease forwards}
.shake{animation:shake .25s ease-in-out 0s 2}
.spin{animation:spin 1s linear infinite}

.scroll-y{overflow-y:auto}
.scroll-y::-webkit-scrollbar{width:4px}
.scroll-y::-webkit-scrollbar-track{background:transparent}
.scroll-y::-webkit-scrollbar-thumb{background:var(--border);border-radius:999px}

.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;cursor:pointer;transition:all .18s;font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:rgba(255,255,255,.42);border:none;background:transparent;width:100%;text-align:left;font-family:'Plus Jakarta Sans',sans-serif}
.nav-item:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-item.active{background:#fff;color:var(--ink)}
.nav-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:7px;background:rgba(255,255,255,.08);flex-shrink:0;transition:all .18s}
.nav-item.active .nav-icon{background:var(--red);color:#fff}
.nav-item:hover:not(.active) .nav-icon{background:rgba(255,255,255,.16)}

.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);box-shadow:0 -8px 24px rgba(0,0,0,.06);z-index:50}
.bottom-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px 8px;border:none;background:transparent;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif}
.bottom-nav-btn span{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.04em}

.input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;outline:none;background:#fff;transition:border-color .15s,box-shadow .15s;color:var(--ink)}
.input:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(220,31,31,.08)}
.input::placeholder{color:var(--muted);font-weight:500}

.btn-primary{background:var(--red);color:#fff;border:none;border-radius:10px;padding:12px 22px;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn-primary:hover{background:var(--red-deep)}
.btn-primary:disabled{background:#e0d9d5;color:#b0a9a4;cursor:not-allowed}
.btn-ghost{background:var(--smoke);color:var(--ink);border:1.5px solid var(--border);border-radius:10px;padding:10px 18px;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;transition:all .15s}
.btn-ghost:hover{border-color:var(--ink);background:#fff}

.card{background:#fff;border:1.5px solid var(--border);border-radius:16px;overflow:hidden}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:6px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.login-bg{background:linear-gradient(145deg,#0D0D0D 0%,#1A0505 60%,#2A0808 100%)}

.vtable thead th{padding:10px 14px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);background:var(--smoke);border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
.vtable tbody tr{border-bottom:1px solid var(--smoke);transition:background .12s;cursor:pointer}
.vtable tbody tr:hover{background:var(--smoke)}
.vtable tbody td{padding:10px 14px;font-size:11.5px;color:var(--ink);white-space:nowrap}

@media(max-width:860px){
  .sidebar{display:none!important}
  .bottom-nav{display:flex!important}
  .main-area{padding-bottom:76px!important}
  .kpi-grid{grid-template-columns:1fr 1fr!important}
  .chart-grid{grid-template-columns:1fr!important}
}

const useFirestore=(collectionName)=>{
  const[data,setData]=useState([]);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState(null);
  useEffect(()=>{
    if(!FB_CONFIGURED){ setLoading(false); return; }
    setLoading(true);
    const unsub=col(collectionName).onSnapshot(
      s=>{setData(s.docs.map(d=>({id:d.id,...d.data()})));setLoading(false);setError(null);},
      e=>{console.error(e);setLoading(false);setError(e.message||String(e));}
    );
    return unsub;
  },[collectionName]);
  return{data,loading,error};
};

function stripUndefined(obj){
  if(Array.isArray(obj))return obj.map(stripUndefined);
  if(obj!==null&&typeof obj==='object'){
    const out={};
    Object.entries(obj).forEach(([k,v])=>{if(v!==undefined)out[k]=stripUndefined(v);});
    return out;
  }
  return obj;
}

function toPascalCase(s){ return s.split('-').map(p=>p.charAt(0).toUpperCase()+p.slice(1)).join(''); }
function toCamelCase(s){ const p=toPascalCase(s); return p.charAt(0).toLowerCase()+p.slice(1); }

function Icon({name,size=18,color,className=''}){
  const ref=useRef(null);
  useEffect(()=>{
    if(ref.current&&window.lucide&&window.lucide.icons){
      const icons=window.lucide.icons;
      const d = icons[name] || icons[toPascalCase(name)] || icons[toCamelCase(name)];
      if(d){
        const[,at,ch]=d;const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
        Object.entries({...at,width:size,height:size,class:`lucide ${className}`,viewBox:'0 0 24 24',fill:'none',stroke:color||'currentColor','stroke-width':1.8,'stroke-linecap':'round','stroke-linejoin':'round'}).forEach(([k,v])=>svg.setAttribute(k,v));
        ch.forEach(([t,a])=>{const el=document.createElementNS('http://www.w3.org/2000/svg',t);Object.entries(a).forEach(([k,v])=>el.setAttribute(k,v));svg.appendChild(el);});
        ref.current.innerHTML='';ref.current.appendChild(svg);
      } else {
        ref.current.innerHTML=`<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color||'currentColor'}" stroke-width="1.8"><circle cx="12" cy="12" r="9"/></svg>`;
      }
    }
  },[name,size,color,className]);
  return <span ref={ref} style={{display:'inline-flex',flexShrink:0,alignItems:'center',justifyContent:'center'}} role="img" aria-label={name}/>;
}

function fmtDate(d){
  if(!d) return '—';
  const parts = String(d).split('-');
  if(parts.length===3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
  return d;
}
function toSlug(name){
  return (name||'').trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .split(/\s+/).filter(Boolean);
}
function usernameFor(name){
  const parts = toSlug(name);
  if(parts.length===0) return 'user';
  if(parts.length===1) return parts[0];
  return `${parts[0]}.${parts[parts.length-1]}`;
}
function initials(name){
  const parts = (name||'').trim().split(/\s+/);
  return ((parts[0]?.[0]||'')+(parts[1]?.[0]||parts[0]?.[1]||'')).toUpperCase();
}

function LoginView({ users, onLogin }){

  const submit = (e) => {

    const found = users.find(x => (x.user||'').toLowerCase() === u.trim().toLowerCase() && x.pass === p.trim());

      if(found.active===false){ setErr('Conta desativada. Contate o administrador.'); }

    <div className="login-bg" style={{ height:'100vh', width:'100%', display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}>

        </div>
        <form onSubmit={submit} style={{ padding:32, display:'flex', flexDirection:'column', gap:18 }}>
          {err && (
            <div className="shake" style={{ background:COLORS.redLight, border:'1px solid #FFBDBD', borderRadius:10, padding:'10px 14px', display:'flex', alignItems:'center', gap:8 }}>
              <Icon name="alert-circle" size={14} color={COLORS.red} />
              <span style={{ fontSize:10, fontWeight:700, textTransform:'uppercase', color:COLORS.red }}>{err}</span>
            </div>
          )}
          <div>
            <label style={{ fontSize:8, fontWeight:800, textTransform:'uppercase', letterSpacing:'.14em', color:COLORS.muted, display:'block', marginBottom:6 }}>Usuário</label>

              <input className="input" style={{ paddingLeft:38 }} value={u} onChange={e=>setU(e.target.value)} placeholder="Nome.Sobrenome" autoCapitalize="none" required />

      return o.includes('PENDÊNCIA DE PEÇAS') || o.includes('PENDENCIA DE PEÇAS') || o.includes('AGUARDANDO ENTREGA');
    }).length;
    const aguardandoVidros = vehicles.filter(v=>v.etapa==='VIDRO').length;
    const aguardandoAt = vehicles.filter(v=>{
      const db=(v.db||'').toUpperCase();
      return !v.dataAt || db.includes('PROACTA') || db.includes('AGUARDANDO');
    }).length;
    return { emProducao, concluidos, atrasados, aguardandoPecas, aguardandoVidros, aguardandoAt };
  }, [vehicles]);

  const porEtapa = useMemo(() => {
    const map = {};
    vehicles.forEach(v => { const e=v.etapa||'—'; map[e]=(map[e]||0)+1; });
    return ETAPAS_ORDER.filter(e=>map[e]).map(e => ({ etapa:e, qtd:map[e] }));
  }, [vehicles]);

  const porVendedor = useMemo(() => {
    const map = {};
    vehicles.forEach(v => { if(v.vendedor) map[v.vendedor]=(map[v.vendedor]||0)+1; });
    return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([nome,qtd])=>({ nome: nome.length>16?nome.slice(0,15)+'…':nome, qtd }));
  }, [vehicles]);

  const cumprimento = useMemo(() => {
    let sim=0, nao=0, na=0;
    vehicles.forEach(v => {
      if(v.cumprimentoPrazo==='SIM') sim++;
      else if(v.cumprimentoPrazo==='NÃO') nao++;
      else na++;
    });
    return [
      { name:'No prazo', value:sim, color:'#0A6B34' },
      { name:'Fora do prazo', value:nao, color:COLORS.red },
      { name:'Em andamento', value:na, color:COLORS.muted },
    ].filter(x=>x.value>0);
  }, [vehicles]);

  const maxEtapa = Math.max(1, ...porEtapa.map(x=>x.qtd));
  const maxVendedor = Math.max(1, ...porVendedor.map(x=>x.qtd));
  const totalCump = cumprimento.reduce((a,b)=>a+b.value,0) || 1;

  if(vehicles.length===0){
    return (
      <div className="fade-up card" style={{ padding:50, textAlign:'center' }}>
        <Icon name="file-spreadsheet" size={34} color={COLORS.muted} />
        <div style={{ fontWeight:800, fontSize:15, marginTop:14 }}>Nenhum dado carregado ainda</div>
        <div style={{ fontSize:12, color:COLORS.muted, marginTop:6, fontWeight:600 }}>
          {role==='master' ? 'Vá em "Upload Planilha" para carregar o Semáforo Operacional.' : 'Aguarde o Master carregar a planilha do Semáforo.'}
        </div>
      </div>
    );
  }

  return (
    <div className="fade-up" style={{ display:'flex', flexDirection:'column', gap:22 }}>
      <div>
        <h1 style={{ fontSize:22, fontWeight:800, margin:0, letterSpacing:'-.01em' }}>
          {role==='comercial' ? `Olá, ${user.nome.split(' ')[0]}` : 'Dashboard de Produção'}
        </h1>
        <p style={{ fontSize:12, color:COLORS.muted, margin:'4px 0 0', fontWeight:600 }}>
          {role==='comercial' ? 'Acompanhamento dos seus veículos em produção' : 'Visão geral de todos os veículos em produção'}
        </p>
      </div>

      <div className="kpi-grid" style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:14 }}>
        <StatCard iconName="car" label="Em Produção" value={kpis.emProducao} accent="#1A4EC2" />
        <StatCard iconName="check-circle-2" label="Concluídos" value={kpis.concluidos} accent="#0A6B34" />
        <StatCard iconName="alert-triangle" label="Em Atraso" value={kpis.atrasados} accent={COLORS.red} />
        <StatCard iconName="package" label="Aguardando Peças" value={kpis.aguardandoPecas} accent="#B45309" />
        <StatCard iconName="file-text" label="Aguardando Vidros" value={kpis.aguardandoVidros} accent="#1A4EC2" />
        <StatCard iconName="shield-check" label="Aguardando AT" value={kpis.aguardandoAt} accent="#7E22CE" />
      </div>

      <div className="chart-grid" style={{ display:'grid', gridTemplateColumns:'1.3fr 1fr', gap:14 }}>
        <div className="card" style={{ padding:20 }}>
          <div style={{ fontSize:11, fontWeight:800, textTransform:'uppercase', letterSpacing:'.06em', color:COLORS.muted, marginBottom:16 }}>Distribuição por Etapa</div>
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {porEtapa.map(({etapa,qtd}) => {
              const m = etapaMeta(etapa);
              return (
                <div key={etapa} style={{ display:'flex', alignItems:'center', gap:10 }}>
                  <div style={{ width:96, fontSize:9.5, fontWeight:800, color:COLORS.muted, textTransform:'uppercase', letterSpacing:'.04em', flexShrink:0 }}>{etapa}</div>
                  <div style={{ flex:1, background:COLORS.smoke, borderRadius:6, height:16, overflow:'hidden' }}>
                    <div style={{ width:`${(qtd/maxEtapa)*100}%`, height:'100%', background:m.color, borderRadius:6, transition:'width .4s' }} />
                  </div>
                  <div style={{ width:26, fontSize:11.5, fontWeight:800, textAlign:'right' }}>{qtd}</div>
                </div>
              );
            })}
          </div>
        </div>

        <div className="card" style={{ padding:20 }}>
          <div style={{ fontSize:11, fontWeight:800, textTransform:'uppercase', letterSpacing:'.06em', color:COLORS.muted, marginBottom:16 }}>Cumprimento de Prazo</div>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'center', margin:'8px 0 18px' }}>
            <svg width="140" height="140" viewBox="0 0 140 140">
              <circle cx="70" cy="70" r="55" fill="none" stroke={COLORS.smoke} strokeWidth="18" />
              {(() => {
                let acc = 0;
                const circ = 2*Math.PI*55;
                return cumprimento.map((seg,i) => {
                  const frac = seg.value/totalCump;
                  const dash = frac*circ;
                  const el = (
                    <circle key={i} cx="70" cy="70" r="55" fill="none" stroke={seg.color} strokeWidth="18"
                      strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={-acc*circ}
                      transform="rotate(-90 70 70)" strokeLinecap="butt" />
                  );
                  acc += frac;
                  return el;
                });
              })()}
              <text x="70" y="65" textAnchor="middle" fontSize="22" fontWeight="800" fill={COLORS.ink}>{totalCump}</text>
              <text x="70" y="82" textAnchor="middle" fontSize="8" fontWeight="700" fill={COLORS.muted} letterSpacing=".05em">VEÍCULOS</text>
            </svg>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            {cumprimento.map(seg => (
              <div key={seg.name} style={{ display:'flex', alignItems:'center', gap:8, fontSize:10.5, fontWeight:700 }}>
                <span style={{ width:9, height:9, borderRadius:3, background:seg.color, flexShrink:0 }} />
                <span style={{ flex:1, color:COLORS.ink }}>{seg.name}</span>
                <span style={{ color:COLORS.muted }}>{seg.value}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {role!=='comercial' && (
        <div className="card" style={{ padding:20 }}>
          <div style={{ fontSize:11, fontWeight:800, textTransform:'uppercase', letterSpacing:'.06em', color:COLORS.muted, marginBottom:16 }}>Distribuição por Vendedor</div>
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {porVendedor.map(({nome,qtd}) => (
              <div key={nome} style={{ display:'flex', alignItems:'center', gap:10 }}>
                <div style={{ width:130, fontSize:10.5, fontWeight:700, color:COLORS.ink, flexShrink:0, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{nome}</div>
                <div style={{ flex:1, background:COLORS.smoke, borderRadius:6, height:14, overflow:'hidden' }}>
                  <div style={{ width:`${(qtd/maxVendedor)*100}%`, height:'100%', background:COLORS.red, borderRadius:6, transition:'width .4s' }} />
                </div>
                <div style={{ width:24, fontSize:11, fontWeight:800, textAlign:'right' }}>{qtd}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   CONSULTA INTELIGENTE (local, sem dependência externa)
   ============================================================ */
function findRelevantVehicles(question, vehicles){
  const q = question.toUpperCase();
  const osMatches = [...q.matchAll(/\b(\d{3,6})\b/g)].map(m=>parseInt(m[1],10));
  const chassiMatches = [...question.matchAll(/\b([A-Z0-9]{9,17})\b/gi)].map(m=>m[1].toUpperCase());

  let found = [];
  if(osMatches.length){
    found = vehicles.filter(v => osMatches.includes(v.os));
  }
  if(found.length===0 && chassiMatches.length){
    found = vehicles.filter(v => chassiMatches.some(c => (v.chassi||'').toUpperCase().includes(c)));
  }
  if(found.length===0){
    const words = question.toLowerCase().split(/\s+/).filter(w=>w.length>3);
    found = vehicles.filter(v => words.some(w => (v.cliente||'').toLowerCase().includes(w) || (v.modelo||'').toLowerCase().includes(w)));
  }
  return found.slice(0,6);
}

function composeAnswer(question, scoped){
  const qlc = question.toLowerCase();
  const total = scoped.length;
  const countAtraso = scoped.filter(v=>v.etapa!=='ENTREGUE' && v.dias!=null && v.dias<0).length;
  const countVidro = scoped.filter(v=>v.etapa==='VIDRO').length;
  const countEntregue = scoped.filter(v=>v.etapa==='ENTREGUE').length;
  const countPecas = scoped.filter(v=>{
    const o=(v.observacoes||'').toUpperCase();
    return o.includes('PENDÊNCIA DE PEÇAS')||o.includes('PENDENCIA DE PEÇAS');
  }).length;

  if(/quant[oa]s/.test(qlc)){
    if(qlc.includes('atraso')) return `Atualmente há ${countAtraso} veículo(s) em atraso, de um total de ${total}.`;
    if(qlc.includes('vidro')) return `${countVidro} veículo(s) estão aguardando vidro no momento.`;
    if(qlc.includes('entreg')) return `${countEntregue} veículo(s) já foram entregues, de um total de ${total} cadastrados.`;
    if(qlc.includes('peça')||qlc.includes('peca')) return `${countPecas} veículo(s) estão com pendência de peças registrada.`;
    return `No total, ${total} veículo(s) estão cadastrados neste painel.`;
  }

  const relevant = findRelevantVehicles(question, scoped);
  if(relevant.length===0){
    return 'Não encontrei nenhum veículo com esses dados. Tente informar o número da OS ou o chassi (ex: "status da OS 9668").';
  }
  if(relevant.length>1){
    return relevant.map(v=>`OS ${v.os} (${v.fabricante} ${v.modelo}): etapa ${v.etapa}, prazo ${fmtDate(v.prazo)}`).join('  •  ');
  }

  const v = relevant[0];
  if(qlc.includes('vidro')) return `O kit de vidro da OS ${v.os} está registrado para ${fmtDate(v.dataKitVidro)}. Etapa atual: ${v.etapa}.`;
  if(qlc.includes(' at ')||qlc.includes('at?')||qlc.includes('exército')||qlc.includes('exercito')||qlc.includes('autoriza')) return `A Data AT (Autorização do Exército) da OS ${v.os} é ${fmtDate(v.dataAt)}.`;
  if(qlc.includes('observa')) return v.observacoes ? `Observações da OS ${v.os}: ${v.observacoes}` : `A OS ${v.os} não possui observações registradas.`;
  if(qlc.includes('pendênc')||qlc.includes('pendenc')||qlc.includes('peça')||qlc.includes('peca')){
    const has = (v.observacoes||'').toUpperCase().includes('PENDÊNCIA')||(v.observacoes||'').toUpperCase().includes('PENDENCIA');
    return has ? `Sim, a OS ${v.os} tem pendência registrada: ${v.observacoes}` : `Não encontrei pendências registradas para a OS ${v.os}.`;
  }
  if(qlc.includes('parad')||qlc.includes('por que')||qlc.includes('porque')){
    return `A OS ${v.os} está na etapa "${v.etapa}"${v.observacoes ? ', com a observação: '+v.observacoes : ', sem observações registradas.'}`;
  }
  if(qlc.includes('etapa')||qlc.includes('status')) return `A OS ${v.os} (${v.fabricante} ${v.modelo}) está atualmente na etapa "${v.etapa}".`;
  if(qlc.includes('chega')||qlc.includes('previs')||qlc.includes('prazo')) return `A previsão de entrega da OS ${v.os} é ${fmtDate(v.previsaoEntrega)} (prazo: ${fmtDate(v.prazo)}).`;

  return `OS ${v.os} — ${v.fabricante} ${v.modelo}, cliente ${v.cliente||'—'}. Etapa: ${v.etapa}. Entrada: ${fmtDate(v.dataEntrada)}. AT: ${fmtDate(v.dataAt)}. Vidro: ${fmtDate(v.dataKitVidro)}. Prazo: ${fmtDate(v.prazo)}.${v.observacoes ? ' Observações: '+v.observacoes : ''}`;
}

/* ============================================================
   UPLOAD DA PLANILHA (Master) — grava direto no Firestore
   ============================================================ */
const COL_MAP = {
  'OS':'os', 'VENDEDOR':'vendedor', 'CLIENTE':'cliente', 'PARCEIRO':'parceiro', 'MODELO':'modelo',
  'FABRICANTE':'fabricante', 'COR':'cor', 'CHASSI':'chassi', 'DATA ENTRADA':'dataEntrada',
  'DATA DESMONTAGEM':'dataDesmontagem', 'DATA KIT VIDRO':'dataKitVidro', 'DATA AT':'dataAt', 'DB':'db',
  'ETAPA':'etapa', 'LOCALIZAÇÃO':'localizacao', 'OBSERVAÇÕES':'observacoes', 'PRAZO':'prazo',
  'PREVISÃO ENTREGA':'previsaoEntrega', 'DIAS':'dias', 'DATA ENTREGA':'dataEntrega',
  'LEAD TIME PRODUÇÃO':'leadTime', 'CUMPRIMENTO DE PRAZOS':'cumprimentoPrazo',
};

function excelDateToStr(v){
  if(v==null || v==='') return null;
  if(typeof v === 'number'){
    const d = XLSX.SSF.parse_date_code(v);
    if(!d) return null;
    return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
  }
  if(v instanceof Date){
    return `${v.getFullYear()}-${String(v.getMonth()+1).padStart(2,'0')}-${String(v.getDate()).padStart(2,'0')}`;
  }
  return String(v).trim() || null;
}

function parseWorkbook(workbook){
  const sheetName = workbook.SheetNames.find(n => n.toUpperCase().includes('PRINCIPAL')) || workbook.SheetNames[0];
  const ws = workbook.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, { defval:null, raw:true });
  const dateFields = new Set(['dataEntrada','dataDesmontagem','dataKitVidro','dataAt','prazo','previsaoEntrega','dataEntrega']);

  const vehicles = [];
  for(const row of rows){
    const rec = {};
    for(const [rawKey, val] of Object.entries(row)){
      const key = rawKey.trim().toUpperCase();
      const mapped = COL_MAP[key];
      if(!mapped) continue;
      rec[mapped] = val;
    }
    if(rec.os == null || rec.os === '') continue;
    rec.os = parseInt(rec.os, 10);
    dateFields.forEach(f => { if(rec[f]!=null) rec[f] = excelDateToStr(rec[f]); });
    rec.etapa = (rec.etapa || 'RECEBIDO').toString().trim().toUpperCase();
    rec.dias = rec.dias!=null && rec.dias!=='' ? Math.round(Number(rec.dias)) : null;
    vehicles.push(rec);
  }
  return vehicles;
}

async function chunkedBatchWrite(docs, writeFn){
  const CHUNK = 400;
  for(let i=0; i<docs.length; i+=CHUNK){
    const batch = db.batch();
    docs.slice(i, i+CHUNK).forEach(d => writeFn(batch, d));
    await batch.commit();
  }
}

async function replaceVehiclesInFirestore(vehicles, onProgress){
  const existingSnap = await col('vehicles').get();
  onProgress && onProgress('Removendo dados antigos...');
  await chunkedBatchWrite(existingSnap.docs, (batch, doc) => batch.delete(doc.ref));
  onProgress && onProgress('Gravando veículos atualizados...');
  await chunkedBatchWrite(vehicles, (batch, v) => batch.set(col('vehicles').doc(String(v.os)), stripUndefined(v)));
}

async function syncVendorUsers(vehicles, existingUsers, onProgress){
  const vendorNames = [...new Set(vehicles.map(v=>v.vendedor).filter(Boolean))];
  const existingUsernames = new Set(existingUsers.map(u=>u.user));
  const toCreate = vendorNames.filter(name => !existingUsernames.has(usernameFor(name)));
  if(toCreate.length===0) return [];
  onProgress && onProgress('Criando contas de vendedores...');
  const batch = db.batch();
  toCreate.forEach(name => {
    batch.set(col('users').doc(usernameFor(name)), {
      user: usernameFor(name), pass:'vrz2026', role:'comercial', nome:name, vendedor:name, active:true,
    });
  });
  await batch.commit();
  return toCreate;
}

function UploadView({ users, history, onDone }){
  const [dragOver, setDragOver] = useState(false);
  const [status, setStatus] = useState('idle');
  const [step, setStep] = useState('');
  const [errorMsg, setErrorMsg] = useState('');
  const [summary, setSummary] = useState(null);
  const inputRef = useRef(null);

  const processFile = async (file) => {
    setStatus('processing');
    setErrorMsg('');
    setStep('Lendo arquivo...');
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type:'array', cellDates:false });
      const vehicles = parseWorkbook(wb);
      if(vehicles.length===0){
        setStatus('error');
        setErrorMsg('Não encontrei nenhuma linha válida (coluna "OS") na planilha. Verifique se é o arquivo do Semáforo Operacional.');
        return;
      }
      await replaceVehiclesInFirestore(vehicles, setStep);
      const newVendors = await syncVendorUsers(vehicles, users, setStep);
      setStep('Registrando histórico...');
      await col('uploads').add({ fileName:file.name, count:vehicles.length, date:new Date().toLocaleString('pt-BR'), ts:Date.now() });
      setSummary({ fileName:file.name, count:vehicles.length, newVendors:newVendors.length });
      setStatus('done');
      onDone && onDone();
    } catch(e){
      console.error(e);
      setStatus('error');
      setErrorMsg('Não foi possível processar este arquivo. Confirme que é um .xlsx válido e que as regras do Firestore permitem escrita.');
    }
  };

  return (
    <div className="fade-up" style={{ display:'flex', flexDirection:'column', gap:18 }}>
      <div>
        <h1 style={{ fontSize:22, fontWeight:800, margin:0 }}>Upload da Planilha</h1>
        <p style={{ fontSize:12, color:COLORS.muted, margin:'4px 0 0', fontWeight:600 }}>Envie o Semáforo Operacional (.xlsx) para atualizar o Firebase — todo o portal (Dashboard, Busca e Visão Comercial) reflete em tempo real</p>
      </div>

      <div
        onDragOver={e=>{e.preventDefault(); setDragOver(true);}}
        onDragLeave={()=>setDragOver(false)}
        onDrop={e=>{ e.preventDefault(); setDragOver(false); const f=e.dataTransfer.files[0]; if(f) processFile(f); }}
        onClick={()=>status!=='processing' && inputRef.current?.click()}
        className="card"
        style={{ padding:'50px 20px', textAlign:'center', cursor: status==='processing'?'default':'pointer', borderStyle:'dashed', borderWidth:2, borderColor: dragOver?COLORS.red:COLORS.border, background: dragOver?COLORS.redLight:'#fff', transition:'all .15s' }}
      >
        <input ref={inputRef} type="file" accept=".xlsx,.xls" style={{ display:'none' }} onChange={e=>{ const f=e.target.files[0]; if(f) processFile(f); }} />
        {status==='processing' ? (
          <>
            <Icon name="loader-2" size={30} color={COLORS.red} className="spin" />
            <div style={{ fontWeight:800, fontSize:13, marginTop:14 }}>{step || 'Processando...'}</div>
            <div style={{ fontSize:11, color:COLORS.muted, marginTop:4 }}>Não feche esta página</div>
          </>
        ) : (
          <>
            <div style={{ width:56, height:56, borderRadius:16, background:COLORS.smoke, display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 16px' }}>
              <Icon name="file-spreadsheet" size={26} color={COLORS.red} />
            </div>
            <div style={{ fontWeight:800, fontSize:14 }}>Arraste a planilha aqui ou clique para selecionar</div>
            <div style={{ fontSize:11, color:COLORS.muted, marginTop:6 }}>Formato aceito: .xlsx — planilha "Semáforo Operacional"</div>
          </>
        )}
      </div>

      {status==='error' && (
        <div className="shake card" style={{ padding:16, background:COLORS.redLight, borderColor:'#FFBDBD', display:'flex', gap:10, alignItems:'flex-start' }}>
          <Icon name="alert-circle" size={16} color={COLORS.red} style={{ flexShrink:0, marginTop:1 }}/>
          <div style={{ fontSize:12, fontWeight:600, color:COLORS.red }}>{errorMsg}</div>
        </div>
      )}
      {status==='done' && summary && (
        <div className="fade-in card" style={{ padding:16, background:'#EDFAF3', borderColor:'#AAE6C5', display:'flex', gap:10, alignItems:'flex-start' }}>
          <Icon name="check-circle" size={16} color="#0A6B34" style={{ flexShrink:0, marginTop:1 }}/>
          <div>
            <div style={{ fontSize:12.5, fontWeight:800, color:'#0A6B34' }}>Planilha processada com sucesso</div>
            <div style={{ fontSize:11, fontWeight:600, color:'#0A6B34', marginTop:2 }}>
              {summary.count} veículos gravados no Firebase a partir de "{summary.fileName}".
              {summary.newVendors>0 && ` ${summary.newVendors} nova(s) conta(s) de vendedor criada(s) (senha padrão: vrz2026).`}
            </div>
          </div>
        </div>
      )}

      <div className="card" style={{ padding:20 }}>
        <div style={{ fontSize:11, fontWeight:800, textTransform:'uppercase', letterSpacing:'.06em', color:COLORS.muted, marginBottom:14 }}>Histórico de Atualizações</div>
        {history.length===0 && <div style={{ fontSize:12, color:COLORS.muted, fontWeight:600 }}>Nenhuma atualização registrada ainda.</div>}
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {history.slice(0,10).map((h) => (
            <div key={h.id} style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 12px', background:COLORS.smoke, borderRadius:10 }}>
              <Icon name="file-spreadsheet" size={14} color={COLORS.muted} />
              <div style={{ flex:1 }}>
                <div style={{ fontSize:11.5, fontWeight:700 }}>{h.fileName}</div>
                <div style={{ fontSize:10, color:COLORS.muted, fontWeight:600 }}>{h.count} veículos · {h.date}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   APP
   ============================================================ */
function App(){
  const { data: usersRaw, loading: usersLoading, error: usersError } = useFirestore('users');
  const { data: vehicles, loading: vehiclesLoading } = useFirestore('vehicles');
  const { data: uploadsRaw } = useFirestore('uploads');
  const [loggedUser, setLoggedUser] = useState(null);
  const [active, setActive] = useState('dashboard');
  const [seeded, setSeeded] = useState(false);
  const [seedError, setSeedError] = useState(null);

  const history = useMemo(() => [...uploadsRaw].sort((a,b)=>(b.ts||0)-(a.ts||0)), [uploadsRaw]);

  // Bootstrap: cria o usuário Master automaticamente se a coleção estiver vazia
  useEffect(() => {
    if(FB_CONFIGURED && !usersLoading && !usersError && usersRaw.length===0 && !seeded){
      setSeeded(true);
      col('users').doc(MASTER_USER).set({
        user: MASTER_USER, pass: MASTER_PASS, role:'master', nome:'Lucas Sabino', active:true,
      }).catch(e => { console.error(e); setSeedError(e.message||String(e)); setSeeded(false); });
    }
  }, [usersLoading, usersError, usersRaw, seeded]);

  // Mantém o usuário logado sincronizado com o Firestore (ex: se for desativado)
  useEffect(() => {
    if(!loggedUser) return;
    const fresh = usersRaw.find(u => u.user === loggedUser.user);
    if(!fresh || fresh.active===false){ setLoggedUser(null); return; }
    if(JSON.stringify(fresh) !== JSON.stringify(loggedUser)) setLoggedUser(fresh);
  }, [usersRaw]);

  const handleLogin = (u) => { setLoggedUser(u); setActive('dashboard'); };
  const handleLogout = () => setLoggedUser(null);

  const scopedVehicles = useMemo(() => {
    if(!loggedUser) return [];
    if(loggedUser.role==='comercial') return vehicles.filter(v=>v.vendedor===loggedUser.vendedor);
    return vehicles;
  }, [vehicles, loggedUser]);

  if(!FB_CONFIGURED){
    return <SetupScreen />;
  }

  if(usersError || seedError){
    return <SetupScreen errorMsg={usersError || seedError} />;
  }

  if(usersLoading || (usersRaw.length===0 && !seeded)){
    return (
      <div className="login-bg" style={{ height:'100vh', width:'100%', display:'flex', alignItems:'center', justifyContent:'center' }}>
        <Icon name="loader-2" size={30} color="#fff" className="spin" />
      </div>
    );
  }

  if(!loggedUser){
    return <LoginView users={usersRaw} onLogin={handleLogin} />;
  }

  return (
    <div style={{ display:'flex', height:'100vh', width:'100%', background:'#fff' }}>
      <Sidebar role={loggedUser.role} active={active} setActive={setActive} user={loggedUser} onLogout={handleLogout} />
      <div className="main-area scroll-y" style={{ flex:1, padding:'28px 32px', height:'100vh' }}>
        {vehiclesLoading ? (
          <div style={{ display:'flex', alignItems:'center', gap:10, color:COLORS.muted, fontWeight:700, fontSize:12 }}>
            <Icon name="loader-2" size={16} className="spin" /> Carregando dados do Firebase...
          </div>
        ) : (
          <>
            {active==='dashboard' && <DashboardView vehicles={scopedVehicles} role={loggedUser.role} user={loggedUser} />}
            {active==='veiculos' && <SearchView vehicles={vehicles} role={loggedUser.role} />}
            {active==='comercial' && <ComercialView vehicles={vehicles} role={loggedUser.role} user={loggedUser} />}
            {active==='ia' && <ChatView vehicles={vehicles} role={loggedUser.role} user={loggedUser} />}
            {active==='upload' && loggedUser.role==='master' && <UploadView users={usersRaw} history={history} onDone={()=>{}} />}
            {active==='usuarios' && loggedUser.role==='master' && <UsersView users={usersRaw} />}
          </>
        )}
      </div>
      <BottomNav role={loggedUser.role} active={active} setActive={setActive} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
