function fmtDate(d){
  if(!d) return '—';
  const parts = String(d).split('-');
  if(parts.length===3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
  return d;
}

function toSlug(name){
  return (name||'').trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .split(/\s+/).filter(Boolean);
}

function usernameFor(name){
  const parts = toSlug(name);
  if(parts.length===0) return 'user';
  if(parts.length===1) return parts[0];
  return `${parts[0]}.${parts[parts.length-1]}`;
}

function initials(name){
  const parts = (name||'').trim().split(/\s+/);
  return ((parts[0]?.[0]||'')+(parts[1]?.[0]||parts[0]?.[1]||'')).toUpperCase();
}

/* ============================================================
   FUNÇÕES DE CÁLCULO DE DATAS
   ============================================================ */
function isBusinessDay(date){
  const day = date.getDay();
  return day !== 0 && day !== 6;
}

function addBusinessDays(dateStr, numDays){
  if(!dateStr) return null;
  const parts = dateStr.split('-');
  if(parts.length !== 3) return null;
  const date = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  let count = 0;
  while(count < numDays){
    date.setDate(date.getDate() + 1);
    if(isBusinessDay(date)) count++;
  }
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

function getMaxDate(date1, date2){
  if(!date1 && !date2) return null;
  if(!date1) return date2;
  if(!date2) return date1;
  return date1 > date2 ? date1 : date2;
}

function calculateDataContratual(dataAt, dataKitVidro){
  const maxDate = getMaxDate(dataAt, dataKitVidro);
  if(!maxDate) return null;
  return addBusinessDays(maxDate, 30);
}

function DashboardView({ vehicles, role, user }){
  const [selectedVendor, setSelectedVendor] = useState('ALL');
  
  const isMaster = role === 'master';
  const vendedoresUnicos = useMemo(() => {
    return [...new Set(vehicles.map(v=>v.vendedor).filter(Boolean))].sort();
  }, [vehicles]);

  const scoped = useMemo(() => {
    if (isMaster && selectedVendor !== 'ALL') {
      return vehicles.filter(v => v.vendedor === selectedVendor);
    }
    if (!isMaster) {
      return vehicles.filter(v => v.vendedor === user.vendedor);
    }
    return vehicles;
  }, [vehicles, selectedVendor, isMaster, user]);

  const total = scoped.length;
  const entregues = scoped.filter(v=>v.etapa==='ENTREGUE').length;
  const emProducao = scoped.filter(v=>v.etapa!=='ENTREGUE').length;
  const atrasados = scoped.filter(v=>v.etapa!=='ENTREGUE' && v.dias!=null && v.dias<0).length;
  const noAmarelo = scoped.filter(v=>v.etapa!=='ENTREGUE' && v.dias!=null && v.dias===0).length;
  const noVerde = scoped.filter(v=>v.etapa!=='ENTREGUE' && v.dias!=null && v.dias>0).length;
  
  const taxaEntrega = total > 0 ? Math.round((entregues / total) * 100) : 0;
  const leadTimeMedia = useMemo(() => {
    const comLeadTime = scoped.filter(v => v.leadTime != null && v.etapa === 'ENTREGUE');
    if (comLeadTime.length === 0) return 0;
    const soma = comLeadTime.reduce((acc, v) => acc + Number(v.leadTime), 0);
    return Math.round(soma / comLeadTime.length);
  }, [scoped]);

  const etapaDistribution = useMemo(() => {
    const dist = {};
    ETAPAS_ORDER.forEach(e => {
      dist[e] = scoped.filter(v => v.etapa === e).length;
    });
    return Object.entries(dist).filter(([_, count]) => count > 0).map(([etapa, count]) => ({

/* ============================================================
   INTEGRAÇÃO PORTAL DE PEÇAS
   ============================================================ */
function PartsStatus({ os }) {
  const [parts, setParts] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!os) return;
    
    const pecasConfig = {
      apiKey: "AIzaSyBT1N43mp6hoxXOj6bmTlqouQWSmfn32-E",
      authDomain: "portal-compras-vrz.firebaseapp.com",
      projectId: "portal-compras-vrz",
      storageBucket: "portal-compras-vrz.firebasestorage.app",
      messagingSenderId: "713014398002",
      appId: "1:713014398002:web:d89f485af020178b00002b"
    };

    let pecasApp;
    try {
      if (!firebase.apps.find(app => app.name === 'pecasApp')) {
        pecasApp = firebase.initializeApp(pecasConfig, 'pecasApp');
      } else {
        pecasApp = firebase.app('pecasApp');
      }
    } catch(err) {
      console.error('Erro ao inicializar Firebase Peças:', err);
      return;
    }

    const pecasDb = pecasApp.firestore();
    const AID = 'portal-compras-vrz';
    const pecasCol = pecasDb.collection('artifacts').doc(AID).collection('public').doc('data').collection('requests');

    setLoading(true);
    
    // Normalização radical da OS
    const cleanOS = String(os).replace(/\D/g, ''); // Apenas números
    const osNum = parseInt(cleanOS, 10);
    const osStr = cleanOS;

    let unsub = null;

    // Busca exaustiva: trazemos as requisições e filtramos no cliente para garantir 100% de precisão
    unsub = pecasCol.onSnapshot(snap => {
      let allItems = [];
      snap.docs.forEach(doc => {
        const data = doc.data();
        const docOS = String(data.os || '').replace(/\D/g, '');
        
        // Compara a OS limpa (sem zeros à esquerda, sem caracteres especiais)
        if (docOS === osStr || parseInt(docOS, 10) === osNum) {
          if (data.items && Array.isArray(data.items)) {
            // Adiciona metadados da requisição a cada item
            const itemsWithMeta = data.items.map(it => ({ 
              ...it, 
              responsavel: data.responsavel, 
              timestamp: data.timestamp?.toDate ? data.timestamp.toDate() : data.timestamp 
            }));
            allItems = [...allItems, ...itemsWithMeta];
          }
        }
      });

      // Remove duplicatas se houver (baseado na descrição e status)
      const uniqueItems = allItems.filter((v, i, a) => 
        a.findIndex(t => t.description === v.description && t.status === v.status) === i
      );

      // Ordena por data (mais recentes primeiro)
      uniqueItems.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

      setParts(uniqueItems);
      setLoading(false);
    }, err => {
      console.error('Erro ao buscar peças:', err);
      setLoading(false);
    });

    return () => unsub && unsub();
  }, [os]);

  if (loading) return <div style={{ fontSize: 11, color: COLORS.muted, padding: 10 }}><Icon name="loader-2" size={12} className="spin" /> Carregando status das peças...</div>;
  if (parts.length === 0) return <div style={{ fontSize: 11, color: COLORS.muted, padding: 10, background: COLORS.smoke, borderRadius: 10, border: `1px solid ${COLORS.border}` }}>Nenhuma requisição de peça encontrada para esta OS.</div>;

  const getStatusBadge = (status) => {
    const map = {
      'pending': { label: 'Pendente', color: '#C45E00', bg: '#FFF4E6', border: '#FFD9A8' },
      'quoting': { label: 'Em Cotação', color: '#1A4EC2', bg: '#EAF0FF', border: '#C0D0F5' },
      'bought': { label: 'Comprado', color: '#6B21A8', bg: '#F3E8FF', border: '#D8B4FE' },
      'done': { label: 'Chegou', color: '#0A6B34', bg: '#EDFAF3', border: '#AAE6C5' },
      'donated': { label: 'Doado', color: COLORS.red, bg: '#FFF0F0', border: '#FFBDBD' }
    };
    const s = map[status] || { label: status, color: COLORS.muted, bg: COLORS.smoke, border: COLORS.border };
    return (
      <span style={{ 
        padding: '2px 6px', borderRadius: 4, fontSize: 9, fontWeight: 800, 
        textTransform: 'uppercase', color: s.color, background: s.bg, border: `1px solid ${s.border}` 
      }}>
        {s.label}
      </span>
    );
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
      {parts.map((item, idx) => (
        <div key={idx} style={{ 
          padding: 12, borderRadius: 10, background: '#fff', border: `1px solid ${COLORS.border}`,
          display: 'flex', flexDirection: 'column', gap: 6
        }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 10 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: COLORS.ink, lineHeight: 1.3 }}>{item.description}</div>
            {getStatusBadge(item.status)}
          </div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 12, fontSize: 10, fontWeight: 600, color: COLORS.muted }}>
            {item.status === 'bought' && item.previsao && (
              <div style={{ display: 'flex', alignItems: 'center', gap: 4, color: '#6B21A8' }}>
                <Icon name="calendar" size={10} /> Prev. Entrega: {item.previsao}
              </div>
            )}
            {item.status === 'done' && (item.dataChegada || item.previsao) && (
              <div style={{ display: 'flex', alignItems: 'center', gap: 4, color: '#0A6B34' }}>
                <Icon name="check-circle" size={10} /> Chegou dia: {item.dataChegada || item.previsao}
              </div>
            )}
            {item.status !== 'bought' && item.status !== 'done' && item.previsao && (
              <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                <Icon name="calendar" size={10} /> {item.previsao}
              </div>
            )}
            <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
              <Icon name="user" size={10} /> {item.responsavel}
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ============================================================
   TABELA GENÉRICA
   ============================================================ */
function GenericTableView({ vehicles, role, title, subtitle, columns, initialExportCols, showVendorFilter }){
  const [q, setQ] = useState('');
  const [selectedEtapas, setSelectedEtapas] = useState(null);
  const [selectedVendor, setSelectedVendor] = useState('ALL');
  const [selected, setSelected] = useState(null);
  const [showExportModal, setShowExportModal] = useState(false);
  const [exportCols, setExportCols] = useState(initialExportCols);
  const { allParts, loading: partsLoading } = usePartsStatus();

  const getConsolidatedStatus = (os) => {
    const cleanOS = String(os).replace(/\D/g, '');
    const parts = allParts[cleanOS] || [];
    if (parts.length === 0) return { label: 'Sem Pendencia de Peças', color: COLORS.muted, bg: COLORS.smoke, border: COLORS.border };
    
    const total = parts.length;
    const pending = parts.filter(p => p.status === 'pending' || p.status === 'quoting').length;
    const bought = parts.filter(p => p.status === 'bought').length;
    const done = parts.filter(p => p.status === 'done').length;

    const getLatestDate = (items) => {
      const dates = items.map(it => it.previsao || it.dataChegada).filter(Boolean);
      if (dates.length === 0) return null;
      return dates.sort().reverse()[0];
    };

    if (pending === total) return { label: 'Peças Pendentes', color: '#C45E00', bg: '#FFF4E6', border: '#FFD9A8' };
    if (pending > 0 && (bought > 0 || done > 0)) return { label: 'Comprado Parcialmente', color: '#C45E00', bg: '#FFF4E6', border: '#FFD9A8' };
    if (bought > 0 && done === 0 && pending === 0) {
      const date = getLatestDate(parts.filter(p => p.status === 'bought'));
      return { label: `Aguardando Chegada ${date ? '('+date+')' : ''}`, color: '#6B21A8', bg: '#F3E8FF', border: '#D8B4FE' };
    }
    if (done > 0 && (bought > 0 || pending > 0)) {
      const date = getLatestDate(parts.filter(p => p.status === 'bought'));
      return { label: `Chegou Parcialmente ${date ? '('+date+')' : ''}`, color: '#1A4EC2', bg: '#EAF0FF', border: '#C0D0F5' };
    }
    if (done === total) {
      const date = getLatestDate(parts.filter(p => p.status === 'done'));
      return { label: `Concluído ${date ? '('+date+')' : ''}`, color: '#0A6B34', bg: '#EDFAF3', border: '#AAE6C5' };
    }
    return { label: 'Sem Pendencia de Peças', color: COLORS.muted, bg: COLORS.smoke, border: COLORS.border };
  };

  const etapasPresentes = useMemo(() => {
    const etapas = [...new Set(vehicles.map(v=>v.etapa).filter(Boolean))];
    return ETAPAS_ORDER.filter(e => etapas.includes(e));
  }, [vehicles]);

  useEffect(() => {
    if (selectedEtapas === null && etapasPresentes.length > 0) {
      setSelectedEtapas(etapasPresentes.filter(e => e !== 'ENTREGUE'));
    }
  }, [etapasPresentes]);

  const toggleEtapa = (e) => {
    setSelectedEtapas(prev => {
      const current = prev || [];
      return current.includes(e) ? current.filter(x=>x!==e) : [...current, e];
    });
  };

  const vendedoresPresentes = useMemo(() => {
    return [...new Set(vehicles.map(v=>v.vendedor).filter(Boolean))].sort();
  }, [vehicles]);

  const filtered = useMemo(() => {
    let result = vehicles;
    
    if(selectedVendor !== 'ALL'){
      result = result.filter(v => v.vendedor === selectedVendor);
    }

    if(selectedEtapas !== null){
      result = result.filter(v => selectedEtapas.includes(v.etapa));
    }

    if(q.trim()){
      const qLower = q.toLowerCase();
      result = result.filter(v => 
        String(v.os).includes(qLower) ||
        (v.cliente||'').toLowerCase().includes(qLower) ||
        (v.modelo||'').toLowerCase().includes(qLower) ||
        (v.chassi||'').toLowerCase().includes(qLower)
      );
    }

    return result;
  }, [vehicles, q, selectedEtapas, selectedVendor]);

  const exportExcel = () => {
    const data = filtered.map(v => {
      const row = {};
      exportCols.forEach(key => {
        if(key === 'etapa') row[key] = v[key];
        else if(key.toLowerCase().includes('data') || key === 'prazo' || key === 'previsaoEntrega') row[key] = fmtDate(v[key]);
        else row[key] = v[key] ?? '';
      });
      return row;
    });
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Dados');
    XLSX.writeFile(wb, `${title.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.xlsx`);
    setShowExportModal(false);
  };

  const exportPDF = () => {
    try {
      const doc = new jsPDF.jsPDF({ orientation: 'l', unit: 'mm', format: 'a4' });
      const headers = exportCols.map(c => columns.find(col=>col.key===c)?.label || c);
      const rows = filtered.map(v => exportCols.map(key => {
        if(key === 'etapa') return v[key];
        else if(key.toLowerCase().includes('data') || key === 'prazo' || key === 'previsaoEntrega' || key === 'dataContratual' || key === 'dataIndicativa') return fmtDate(v[key]);
        else return v[key] ?? '';
      }));
      doc.text(title, 14, 10);
      doc.autoTable({ head: [headers], body: rows, startY: 20, margin: 10, styles: { fontSize: 9 }, headStyles: { fillColor: [220, 31, 31], textColor: 255, fontStyle: 'bold' } });
      const title2 = `${title.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}`;
      doc.save(title2 + '.pdf');
      setShowExportModal(false);
    } catch(err){
      console.error('Erro ao exportar PDF:', err);
      alert('Erro ao exportar PDF. Verifique o console para mais detalhes.');
    }
  };

  return (
    <div className="fade-up" style={{ display:'flex', flexDirection:'column', gap:16, height:'100%' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end' }}>
        <div>
          <h1 style={{ fontSize:22, fontWeight:800, margin:0 }}>{title}</h1>
          <p style={{ fontSize:12, color:COLORS.muted, margin:'4px 0 0', fontWeight:600 }}>{subtitle}</p>
        </div>
        <button className="btn-primary" onClick={()=>setShowExportModal(true)}>
          <Icon name="download" size={14} /> Exportar
        </button>
      </div>

      <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
        <div style={{ position:'relative' }}>
          <div style={{ position:'absolute', left:12, top:'50%', transform:'translateY(-50%)', color:COLORS.muted }}><Icon name="search" size={15}/></div>
          <input className="input" style={{ paddingLeft:38 }} placeholder="Buscar..." value={q} onChange={e=>setQ(e.target.value)} />
        </div>
        
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {showVendorFilter && vendedoresPresentes.length > 0 && (
            <div style={{ display:'flex', gap:8, flexWrap:'wrap', alignItems:'center' }}>
              <div style={{ fontSize:10, fontWeight:800, textTransform:'uppercase', color:COLORS.muted, marginRight:4 }}>Vendedor:</div>

/* ============================================================
   CONSULTA INTELIGENTE
   ============================================================ */
function findRelevantVehicles(question, vehicles){
  const q = question.toUpperCase();
  const osMatches = [...q.matchAll(/\b(\d{3,6})\b/g)].map(m=>parseInt(m[1],10));
  const chassiMatches = [...question.matchAll(/\b([A-Z0-9]{9,17})\b/gi)].map(m=>m[1].toUpperCase());

  let found = [];
  if(osMatches.length){
    found = vehicles.filter(v => osMatches.includes(v.os));
  }
  if(found.length===0 && chassiMatches.length){
    found = vehicles.filter(v => chassiMatches.some(c => (v.chassi||'').toUpperCase().includes(c)));
  }
  if(found.length===0){
    const words = question.toLowerCase().split(/\s+/).filter(w=>w.length>3);
    found = vehicles.filter(v => words.some(w => (v.cliente||'').toLowerCase().includes(w) || (v.modelo||'').toLowerCase().includes(w)));
  }
  return found.slice(0,6);
}

function composeAnswer(question, scoped, role, user, vehicles){
  const qlc = question.toLowerCase();
  const q = question.toUpperCase();
  const osMatches = [...q.matchAll(/\b(\d{3,6})\b/g)].map(m=>parseInt(m[1],10));
  
  if(osMatches.length && role === 'comercial'){
    const osNumber = osMatches[0];
    const osVehicle = vehicles.find(v => v.os === osNumber);
    if(osVehicle && osVehicle.vendedor !== user.vendedor){
      return 'Essa OS não pertence ao seu usuário.';
    }
  }
  
  const total = scoped.length;
  const countAtraso = scoped.filter(v=>v.etapa!=='ENTREGUE' && v.dias!=null && v.dias<0).length;
  const countVidro = scoped.filter(v=>v.etapa==='VIDRO').length;
  const countEntregue = scoped.filter(v=>v.etapa==='ENTREGUE').length;
  const countProducao = scoped.filter(v=>v.etapa!=='ENTREGUE').length;

  if(/quant[oa]s/.test(qlc)){
    if(qlc.includes('atraso')) return `Atualmente há ${countAtraso} veículo(s) em atraso, de um total de ${total}.`;
    if(qlc.includes('vidro')) return `${countVidro} veículo(s) estão na etapa de VIDRO no momento.`;
    if(qlc.includes('entreg')) return `${countEntregue} veículo(s) já foram entregues.`;
    if(qlc.includes('produ')) return `${countProducao} veículo(s) estão em produção.`;
    return `No total, ${total} veículo(s) estão cadastrados.`;
  }

  const relevant = findRelevantVehicles(question, scoped);
  if(relevant.length===0) return 'Não encontrei nenhum veículo com esses dados. Tente informar o número da OS.';
  if(relevant.length>1) return relevant.map(v=>`OS ${v.os}: ${v.etapa}, prazo ${fmtDate(v.prazo)}`).join('  •  ');

  const v = relevant[0];
  const daysInfo = v.dias != null ? ` (${v.dias > 0 ? '+' : ''}${v.dias} dias)` : '';
  return `OS ${v.os} (${v.modelo}) está na etapa "${v.etapa}". Prazo: ${fmtDate(v.prazo)}${daysInfo}. ${v.observacoes ? 'Obs: '+v.observacoes : ''}`;
}

function ChatView({ vehicles, role, user }){
  const scoped = role==='comercial' ? vehicles.filter(v=>v.vendedor===user.vendedor) : vehicles;
  const [messages, setMessages] = useState([
    { role:'assistant', text: `Olá! Como posso ajudar com os veículos hoje?` }
  ]);
  const [input, setInput] = useState('');
  const [history, setHistory] = useState([]);
  const [showHistory, setShowHistory] = useState(false);
  const [loading, setLoading] = useState(false);
  const scrollRef = useRef(null);

  useEffect(() => {
    const loadHistory = async () => {
      try {
        const snap = await col('chat_history').where('userId', '==', user.id).orderBy('timestamp', 'desc').limit(50).get();
        const docs = snap.docs.map(d => d.data());
        setHistory(docs);
      } catch(err){
        console.log('Histórico ainda não disponível');
      }
    };
    loadHistory();
  }, [user.id]);

  useEffect(() => { scrollRef.current?.scrollTo({ top: scrollRef.current.scrollHeight, behavior:'smooth' }); }, [messages]);

  const saveToHistory = async (question, answer) => {
    try {
      await col('chat_history').add({
        userId: user.id,
        userName: user.nome,
        question,
        answer,
        timestamp: new Date(),
        role: role
      });
    } catch(err){
      console.log('Erro ao salvar histórico');
    }
  };

  const ask = async (question) => {
    if(!question.trim()) return;
    setMessages(m => [...m, { role:'user', text: question }]);
    setInput('');
    setLoading(true);
    
    setTimeout(async () => {
      const answer = composeAnswer(question, scoped, role, user, vehicles);
      setMessages(m => [...m, { role:'assistant', text: answer }]);
      await saveToHistory(question, answer);
      setLoading(false);
    }, 250);
  };

  return (
    <div className="fade-up" style={{ display:'flex', flexDirection:'column', height:'100%', gap:14 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end' }}>
        <div>
          <h1 style={{ fontSize:22, fontWeight:800, margin:0 }}>Consulta Inteligente</h1>
          <p style={{ fontSize:12, color:COLORS.muted, margin:'4px 0 0', fontWeight:600 }}>Pergunte sobre os veículos em produção</p>
        </div>
        {history.length > 0 && (
          <button 
            onClick={() => setShowHistory(!showHistory)}
            style={{ background:'none', border:'none', cursor:'pointer', fontSize:11, fontWeight:700, color:COLORS.red, textTransform:'uppercase' }}
          >
            <Icon name="history" size={14} style={{ marginRight:4 }} /> Histórico ({history.length})
          </button>
        )}
      </div>

      <div style={{ display:'grid', gridTemplateColumns: showHistory ? '1fr 280px' : '1fr', gap:16, flex:1, minHeight:0 }}>
        <div className="card" style={{ flex:1, display:'flex', flexDirection:'column', minHeight:420 }}>
          <div ref={scrollRef} className="scroll-y" style={{ flex:1, padding:20, display:'flex', flexDirection:'column', gap:12 }}>
            {messages.map((m,i) => (
              <div key={i} style={{ display:'flex', justifyContent: m.role==='user' ? 'flex-end':'flex-start' }}>
                <div style={{
                  maxWidth:'78%', padding:'11px 15px', borderRadius: m.role==='user' ? '14px 14px 3px 14px':'14px 14px 14px 3px',
                  background: m.role==='user' ? COLORS.red : COLORS.smoke, color: m.role==='user' ? '#fff' : COLORS.ink,
                  fontSize:12.5, fontWeight: m.role==='user'?600:500, lineHeight:1.55,
                }}>
                  {m.role==='assistant' && <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:5 }}><Icon name="sparkles" size={12} color={COLORS.red}/><span style={{ fontSize:9, fontWeight:800, textTransform:'uppercase', color:COLORS.red }}>IA</span></div>}
                  {m.text}
                </div>
              </div>
            ))}
            {loading && (
              <div style={{ display:'flex', justifyContent:'flex-start' }}>
                <div style={{ maxWidth:'78%', padding:'11px 15px', borderRadius:'14px 14px 14px 3px', background:COLORS.smoke, color:COLORS.ink, fontSize:12.5 }}>
                  <Icon name="loader-2" size={14} className="spin" />
                </div>
              </div>
            )}
          </div>
          <form onSubmit={e=>{e.preventDefault(); ask(input);}} style={{ borderTop:`1px solid ${COLORS.border}`, padding:14, display:'flex', gap:10 }}>
            <input className="input" placeholder="Ex: Qual o status da OS 9668?" value={input} onChange={e=>setInput(e.target.value)} disabled={loading} />
            <button type="submit" className="btn-primary" disabled={!input.trim() || loading} style={{ padding:'0 18px' }}><Icon name="send" size={15}/></button>
          </form>
        </div>

        {showHistory && (
          <div className="card" style={{ padding:16, display:'flex', flexDirection:'column', gap:12, maxHeight:500, overflow:'hidden' }}>
            <div style={{ fontSize:11, fontWeight:800, textTransform:'uppercase', color:COLORS.muted }}>Histórico de Perguntas</div>
            <div className="scroll-y" style={{ flex:1, display:'flex', flexDirection:'column', gap:8 }}>
              {history.map((h, i) => (
                <div 
                  key={i} 
                  onClick={() => {
                    setInput(h.question);
                    setShowHistory(false);
                  }}
                  style={{ 
                    padding:10, 
                    background:COLORS.smoke, 
                    borderRadius:6, 
                    cursor:'pointer', 
                    fontSize:11, 
                    fontWeight:600,
                    transition:'all .2s',
                    border:`1px solid ${COLORS.border}`
                  }}
                  onMouseEnter={e => e.target.style.background = COLORS.border}
                  onMouseLeave={e => e.target.style.background = COLORS.smoke}
                >
                  {h.question.substring(0, 40)}...
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function UsersView({ users }){
  const [editing, setEditing] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({ user:'', pass:'', nome:'', role:'comercial', vendedor:'', active:true });

  const save = async (e) => {
    e.preventDefault();
    try {
      if(editing){
        const newId = form.user.toLowerCase().replace(/\s+/g,'.');
        if(newId !== editing.id){
          await col('users').doc(newId).set(stripUndefined({...form, user:newId}));
          await col('users').doc(editing.id).delete();
        } else {
          await col('users').doc(editing.id).update(stripUndefined(form));
        }
      } else {
        const id = form.user.toLowerCase().replace(/\s+/g,'.');
        await col('users').doc(id).set({ ...form, user:id });
      }
      setEditing(null); setShowAdd(false);
      setForm({ user:'', pass:'', nome:'', role:'comercial', vendedor:'', active:true });
    } catch(err){ alert('Erro ao salvar usuário'); }
  };

  const remove = async (id) => {
    if(confirm('Deseja realmente excluir este usuário?')) {
      await col('users').doc(id).delete();
    }

  const startEdit = (u) => {
    setEditing(u);
    setForm({ user:u.user, pass:u.pass, nome:u.nome, role:u.role, vendedor:u.vendedor||'', active:u.active!==false });
    setShowAdd(true);

      )}
    </div>
  );
}

/* ============================================================
   UPLOAD DA PLANILHA
   ============================================================ */
const MAP_OPERACIONAL = {
  'OS':'os', 'VENDEDOR':'vendedor', 'CLIENTE':'cliente', 'PARCEIRO':'parceiro', 'MODELO':'modelo',
  'FABRICANTE':'fabricante', 'COR ':'cor', 'CHASSI':'chassi', 'DATA ENTRADA':'dataEntrada',
  'DATA DESMONTAGEM':'dataDesmontagem', 'DATA KIT VIDRO':'dataKitVidro', 'DATA AT':'dataAt', 'DB':'db',
  'ETAPA':'etapa', 'LOCALIZAÇÃO':'localizacao', 'OBSERVAÇÕES':'observacoes', 'PRAZO ':'prazo',
  'PREVISÃO ENTREGA':'previsaoEntrega', 'DIAS':'dias', 'DATA ENTREGA':'dataEntrega',
  'LEAD TIME PRODUÇÃO':'leadTime', 'CUMPRIMENTO DE PRAZOS':'cumprimentoPrazo',
};

const MAP_COMERCIAL = {
  'OS':'os', 'CLIENTE':'cliente', 'MODELO':'modelo', 'CHASSI':'chassi', 'COR':'cor',
  'DATA ENTRADA':'dataEntrada', 'DATA AUT. EXÉRCITO':'dataAt', 'DATA VIDROS':'dataKitVidro',
  'DATA CONTRATUAL':'prazo', 'DATA NOVA PREVISÃO':'previsaoEntrega', 'DIAS':'dias',
  'STATUS':'etapa', 'OBSERVAÇÕES':'observacoes', 'MARCA':'fabricante',
};

function excelDateToStr(v){
  if(v==null || v==='') return null;
  if(typeof v === 'number'){
    const d = XLSX.SSF.parse_date_code(v);
    if(!d) return null;
    return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
  }
  if(v instanceof Date){
    return `${v.getFullYear()}-${String(v.getMonth()+1).padStart(2,'0')}-${String(v.getDate()).padStart(2,'0')}`;
  }
  return String(v).trim() || null;
}

function parseWorkbook(workbook){
  const sheetNames = workbook.SheetNames;
  let map = MAP_OPERACIONAL;
  let ws = null;
  let startRow = 0;

  if(sheetNames.includes('Semáforo Geral')){
    map = MAP_COMERCIAL;
    ws = workbook.Sheets['Semáforo Geral'];
    startRow = 2;
  } else {
    const mainSheet = sheetNames.find(n => n.toUpperCase().includes('PRINCIPAL')) || sheetNames[0];
    ws = workbook.Sheets[mainSheet];
  }

  const rows = XLSX.utils.sheet_to_json(ws, { defval:null, raw:true, range: startRow });
  const dateFields = new Set(['dataEntrada','dataDesmontagem','dataKitVidro','dataAt','prazo','previsaoEntrega','dataEntrega']);

  const vehicles = [];
  for(const row of rows){
    const rec = {};
    for(const [rawKey, val] of Object.entries(row)){
      const key = rawKey.trim().toUpperCase();
      const mapped = map[key];
      if(!mapped) continue;
      rec[mapped] = val;
    }
    if(rec.os == null || rec.os === '' || isNaN(parseInt(rec.os))) continue;
    rec.os = parseInt(rec.os, 10);
    dateFields.forEach(f => { if(rec[f]!=null) rec[f] = excelDateToStr(rec[f]); });
    rec.etapa = (rec.etapa || 'RECEBIDO').toString().trim().toUpperCase();
    if(rec.etapa === '0') rec.etapa = 'RECEBIDO';
    rec.dias = rec.dias!=null && rec.dias!=='' ? Math.round(Number(rec.dias)) : null;
    vehicles.push(rec);
  }
  return vehicles;
}

async function chunkedBatchWrite(docs, writeFn){
  const CHUNK = 400;
  for(let i=0; i<docs.length; i+=CHUNK){
    const batch = db.batch();
    docs.slice(i, i+CHUNK).forEach(d => writeFn(batch, d));
    await batch.commit();
  }
}

async function replaceVehiclesInFirestore(vehicles, onProgress){
  const existingSnap = await col('vehicles').get();
  onProgress && onProgress('Removendo dados antigos...');
  await chunkedBatchWrite(existingSnap.docs, (batch, doc) => batch.delete(doc.ref));
  onProgress && onProgress('Gravando veículos atualizados...');
  await chunkedBatchWrite(vehicles, (batch, v) => batch.set(col('vehicles').doc(String(v.os)), stripUndefined(v)));
}

async function syncVendorUsers(vehicles, existingUsers, onProgress){
  const vendorNames = [...new Set(vehicles.map(v=>v.vendedor).filter(Boolean))];
  const existingUsernames = new Set(existingUsers.map(u=>u.user));
  const toCreate = vendorNames.filter(name => !existingUsernames.has(usernameFor(name)));
  if(toCreate.length===0) return [];
  onProgress && onProgress('Criando contas de vendedores...');
  const batch = db.batch();
  toCreate.forEach(name => {
    batch.set(col('users').doc(usernameFor(name)), {
      user: usernameFor(name), pass:'vrz2026', role:'comercial', nome:name, vendedor:name, active:true,
    });
  });
  await batch.commit();
  return toCreate;
}

function UploadView({ users, history, onDone }){
  const [dragOver, setDragOver] = useState(false);
  const [status, setStatus] = useState('idle');
  const [step, setStep] = useState('');
  const [errorMsg, setErrorMsg] = useState('');
  const [summary, setSummary] = useState(null);
  const inputRef = useRef(null);

  const processFile = async (file) => {
    setStatus('processing');
    setErrorMsg('');
    setStep('Lendo arquivo...');
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type:'array', cellDates:false });
      const vehicles = parseWorkbook(wb);
      if(vehicles.length===0){
        setStatus('error');
        setErrorMsg('Não encontrei nenhuma linha válida (coluna "OS") na planilha.');
        return;
      }
      await replaceVehiclesInFirestore(vehicles, setStep);
      const newVendors = await syncVendorUsers(vehicles, users, setStep);
      setStep('Registrando histórico...');
      await col('uploads').add({ fileName:file.name, count:vehicles.length, date:new Date().toLocaleString('pt-BR'), ts:Date.now() });
      setSummary({ fileName:file.name, count:vehicles.length, newVendors:newVendors.length });
      setStatus('done');
      onDone && onDone();
    } catch(e){
      console.error(e);
      setStatus('error');
      setErrorMsg('Erro ao processar arquivo.');
    }
  };

  return (
    <div className="fade-up" style={{ display:'flex', flexDirection:'column', gap:18 }}>
      <div>
        <h1 style={{ fontSize:22, fontWeight:800, margin:0 }}>Upload da Planilha</h1>
        <p style={{ fontSize:12, color:COLORS.muted, margin:'4px 0 0', fontWeight:600 }}>Envie SEMAFORO (ATUALIZADO).xlsx ou SemáforoComercial.xlsx</p>
      </div>
      <div
        onDragOver={e=>{e.preventDefault(); setDragOver(true);}}
        onDragLeave={()=>setDragOver(false)}
        onDrop={e=>{ e.preventDefault(); setDragOver(false); const f=e.dataTransfer.files[0]; if(f) processFile(f); }}
        onClick={()=>status!=='processing' && inputRef.current?.click()}
        className="card"
        style={{ padding:'50px 20px', textAlign:'center', cursor: status==='processing'?'default':'pointer', borderStyle:'dashed', borderWidth:2, borderColor: dragOver?COLORS.red:COLORS.border, background: dragOver?COLORS.redLight:'#fff', transition:'all .15s' }}
      >
        <input ref={inputRef} type="file" accept=".xlsx,.xls" style={{ display:'none' }} onChange={e=>{ const f=e.target.files[0]; if(f) processFile(f); }} />
        {status==='processing' ? (
          <>
            <Icon name="loader-2" size={30} color={COLORS.red} className="spin" />
            <div style={{ fontWeight:800, fontSize:13, marginTop:14 }}>{step}</div>
          </>
        ) : (
          <>
            <div style={{ width:56, height:56, borderRadius:16, background:COLORS.smoke, display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 16px' }}>
              <Icon name="file-spreadsheet" size={26} color={COLORS.red} />
            </div>
            <div style={{ fontWeight:800, fontSize:14 }}>Arraste a planilha aqui ou clique para selecionar</div>
          </>
        )}
      </div>
      {status==='done' && summary && (
        <div className="fade-in card" style={{ padding:16, background:'#EDFAF3', borderColor:'#AAE6C5', color:'#0A6B34' }}>
          <b>Sucesso!</b> {summary.count} veículos atualizados.
        </div>
      )}
    </div>
  );
}
