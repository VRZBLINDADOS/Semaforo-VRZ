function stripUndefined(obj){
  if(Array.isArray(obj))return obj.map(stripUndefined);
  if(obj!==null&&typeof obj==='object'){
    const out={};
    Object.entries(obj).forEach(([k,v])=>{if(v!==undefined)out[k]=stripUndefined(v);});

        ref.current.innerHTML='';ref.current.appendChild(svg);
      } else {
        ref.current.innerHTML=`<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color||'currentColor'}" stroke-width="1.8"><circle cx="12" cy="12" r="9"/></svg>`;

function fmtDate(d){
  if(!d) return '—';
  const parts = String(d).split('-');
  if(parts.length===3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
  return d;
}

}

/* ============================================================
   FUNÇÕES DE CÁLCULO DE DATAS
   ============================================================ */
function isBusinessDay(date){
  const day = date.getDay();
  return day !== 0 && day !== 6;
}

function addBusinessDays(dateStr, numDays){
  if(!dateStr) return null;
  const parts = dateStr.split('-');
  if(parts.length !== 3) return null;
  const date = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  let count = 0;
  while(count < numDays){
    date.setDate(date.getDate() + 1);
    if(isBusinessDay(date)) count++;
  }
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

function getMaxDate(date1, date2){
  if(!date1 && !date2) return null;
  if(!date1) return date2;
  if(!date2) return date1;
  return date1 > date2 ? date1 : date2;
}

function calculateDataContratual(dataAt, dataKitVidro){
  const maxDate = getMaxDate(dataAt, dataKitVidro);
  if(!maxDate) return null;
  return addBusinessDays(maxDate, 30);
}

        <StatCard iconName="check-circle-2" label="Entregues" value={entregues} sub={`${taxaEntrega}%`} accent="#0A6B34" />
        <StatCard iconName="wrench" label="Em Produção" value={emProducao} accent="#0369A1" />
        <StatCard iconName="alert-circle" label="Atrasados" value={atrasados} accent="#C2410C" />
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
        <div className="card" style={{ padding:24 }}>
          <div style={{ fontSize:12, fontWeight:800, textTransform:'uppercase', letterSpacing:'.06em', color:COLORS.muted, marginBottom:20 }}>Distribuição por Etapa</div>
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {etapaDistribution.map((item, i) => (
              <div key={i} style={{ display:'flex', alignItems:'center', gap:12 }}>
                <div style={{ flex:1 }}>
                  <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}>
                    <span style={{ fontSize:11, fontWeight:700 }}>{item.name}</span>
                    <span style={{ fontSize:11, fontWeight:800 }}>{item.value}</span>
                  </div>
                  <div style={{ width:'100%', height:6, background:COLORS.smoke, borderRadius:3, overflow:'hidden' }}>
                    <div style={{ width:`${(item.value/total)*100}%`, height:'100%', background:item.color, transition:'all .3s' }} />
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   INTEGRAÇÃO PORTAL DE PEÇAS
   ============================================================ */
function PartsStatus({ os }) {
  const [parts, setParts] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!os) return;
    const pecasConfig = {
      apiKey: "AIzaSyBT1N43mp6hoxXOj6bmTlqouQWSmfn32-E",
      authDomain: "portal-compras-vrz.firebaseapp.com",
      projectId: "portal-compras-vrz",
      storageBucket: "portal-compras-vrz.firebasestorage.app",
      messagingSenderId: "713014398002",
      appId: "1:713014398002:web:d89f485af020178b00002b"
    };

    let pecasApp;
    try {
      if (!firebase.apps.find(app => app.name === 'pecasApp')) {
        pecasApp = firebase.initializeApp(pecasConfig, 'pecasApp');
      } else {
        pecasApp = firebase.app('pecasApp');
      }
    } catch(err) {
      setLoading(false);
      return;
    }

    const pecasDb = pecasApp.firestore();
    const AID = 'portal-compras-vrz';
    const pecasCol = pecasDb.collection('artifacts').doc(AID).collection('public').doc('data').collection('requests');

    setLoading(true);
    // Normalização agressiva: remove zeros e caracteres especiais
    const cleanOS = String(os).replace(/\D/g, '').replace(/^0+/, '');
    const osNum = parseInt(cleanOS, 10);

    const unsub = pecasCol.onSnapshot(snap => {
      let allItems = [];
      snap.docs.forEach(doc => {
        const data = doc.data();
        const docOS = String(data.os || '').replace(/\D/g, '').replace(/^0+/, '');
        
        if (docOS === cleanOS || parseInt(docOS, 10) === osNum) {
          if (data.items && Array.isArray(data.items)) {
            const itemsWithMeta = data.items.map(it => ({ 
              ...it, 
              responsavel: data.responsavel, 
              timestamp: data.timestamp?.toDate ? data.timestamp.toDate() : data.timestamp 
            }));
            allItems = [...allItems, ...itemsWithMeta];
          }
        }
      });

      const uniqueItems = allItems.filter((v, i, a) => 
        a.findIndex(t => t.description === v.description && t.status === v.status) === i
      );

      uniqueItems.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
      setParts(uniqueItems);
      setLoading(false);
    }, err => {
      console.error('Erro ao buscar peças:', err);
      setLoading(false);
    });

    return () => unsub && unsub();
  }, [os]);

  if (loading) return <div style={{ fontSize: 11, color: COLORS.muted, padding: 10 }}><Icon name="loader-2" size={12} className="spin" /> Carregando...</div>;
  if (parts.length === 0) return <div style={{ fontSize: 11, color: COLORS.muted, padding: 10, background: COLORS.smoke, borderRadius: 10, border: `1px solid ${COLORS.border}` }}>Nenhuma requisição de peça encontrada.</div>;

  const getStatusBadge = (status) => {
    const map = {
      'pending': { label: 'Pendente', color: '#C45E00', bg: '#FFF4E6', border: '#FFD9A8' },
      'quoting': { label: 'Em Cotação', color: '#1A4EC2', bg: '#EAF0FF', border: '#C0D0F5' },
      'bought': { label: 'Comprado', color: '#6B21A8', bg: '#F3E8FF', border: '#D8B4FE' },
      'done': { label: 'Chegou', color: '#0A6B34', bg: '#EDFAF3', border: '#AAE6C5' },
      'donated': { label: 'Doado', color: COLORS.red, bg: '#FFF0F0', border: '#FFBDBD' }
    };
    const s = map[status] || { label: status, color: COLORS.muted, bg: COLORS.smoke, border: COLORS.border };
    return (
      <span style={{ padding: '2px 6px', borderRadius: 4, fontSize: 9, fontWeight: 800, textTransform: 'uppercase', color: s.color, background: s.bg, border: `1px solid ${s.border}` }}>{s.label}</span>
    );
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
      {parts.map((item, idx) => (
        <div key={idx} style={{ padding: 12, borderRadius: 10, background: '#fff', border: `1px solid ${COLORS.border}`, display: 'flex', flexDirection: 'column', gap: 6 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 10 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: COLORS.ink }}>{item.description}</div>
            {getStatusBadge(item.status)}
          </div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 12, fontSize: 10, fontWeight: 600, color: COLORS.muted }}>
            {item.status === 'bought' && item.previsao && <div style={{ display: 'flex', alignItems: 'center', gap: 4, color: '#6B21A8' }}><Icon name="calendar" size={10} /> Prev. Entrega: {item.previsao}</div>}
            {item.status === 'done' && (item.dataChegada || item.previsao) && <div style={{ display: 'flex', alignItems: 'center', gap: 4, color: '#0A6B34' }}><Icon name="check-circle" size={10} /> Chegou dia: {item.dataChegada || item.previsao}</div>}
            {item.status !== 'bought' && item.status !== 'done' && item.previsao && <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}><Icon name="calendar" size={10} /> {item.previsao}</div>}
          </div>
        </div>
      ))}
    </div>
  );
}

/* ============================================================
   TABELA GENÉRICA
   ============================================================ */
function GenericTableView({ vehicles, role, title, subtitle, columns, initialExportCols, showVendorFilter }){
  const [q, setQ] = useState('');
  const [selectedEtapas, setSelectedEtapas] = useState(null);
  const [selectedVendor, setSelectedVendor] = useState('ALL');
  const [selected, setSelected] = useState(null);
  const [showExportModal, setShowExportModal] = useState(false);
  const [exportCols, setExportCols] = useState(initialExportCols);
  const { allParts, loading: partsLoading } = usePartsStatus();

  const getConsolidatedStatus = (os) => {
    const cleanOS = String(os).replace(/\D/g, '').replace(/^0+/, '');
    const parts = allParts[cleanOS] || [];
    if (parts.length === 0) return { label: 'Sem Pendencia de Peças', color: COLORS.muted, bg: COLORS.smoke, border: COLORS.border };
    
    const total = parts.length;
    const pending = parts.filter(p => p.status === 'pending' || p.status === 'quoting').length;
    const bought = parts.filter(p => p.status === 'bought').length;
    const done = parts.filter(p => p.status === 'done').length;

    const getLatestDate = (items) => {
      const dates = items.map(it => it.previsao || it.dataChegada).filter(Boolean);
      return dates.length > 0 ? dates.sort().reverse()[0] : null;
    };

    if (pending === total) return { label: 'Peças Pendentes', color: '#C45E00', bg: '#FFF4E6', border: '#FFD9A8' };
    if (pending > 0 && (bought > 0 || done > 0)) return { label: 'Comprado Parcialmente', color: '#C45E00', bg: '#FFF4E6', border: '#FFD9A8' };
    if (bought > 0 && done === 0 && pending === 0) {
      const date = getLatestDate(parts.filter(p => p.status === 'bought'));
      return { label: `Aguardando Chegada ${date ? '('+date+')' : ''}`, color: '#6B21A8', bg: '#F3E8FF', border: '#D8B4FE' };
    }
    if (done > 0 && (bought > 0 || pending > 0)) {
      const date = getLatestDate(parts.filter(p => p.status === 'bought'));
      return { label: `Chegou Parcialmente ${date ? '('+date+')' : ''}`, color: '#1A4EC2', bg: '#EAF0FF', border: '#C0D0F5' };
    }
    if (done === total) {
      const date = getLatestDate(parts.filter(p => p.status === 'done'));
      return { label: `Concluído ${date ? '('+date+')' : ''}`, color: '#0A6B34', bg: '#EDFAF3', border: '#AAE6C5' };
    }
    return { label: 'Sem Pendencia de Peças', color: COLORS.muted, bg: COLORS.smoke, border: COLORS.border };
  };

  const etapasPresentes = useMemo(() => {
    const etapas = [...new Set(vehicles.map(v=>v.etapa).filter(Boolean))];
    return ETAPAS_ORDER.filter(e => etapas.includes(e));
  }, [vehicles]);

  useEffect(() => {
    if (selectedEtapas === null && etapasPresentes.length > 0) {
      setSelectedEtapas(etapasPresentes.filter(e => e !== 'ENTREGUE'));
    }
  }, [etapasPresentes]);

  const filtered = useMemo(() => {
    let result = vehicles;
    if(selectedVendor !== 'ALL') result = result.filter(v => v.vendedor === selectedVendor);
    if(selectedEtapas !== null) result = result.filter(v => selectedEtapas.includes(v.etapa));
    if(q.trim()){
      const qLower = q.toLowerCase();
      result = result.filter(v => String(v.os).includes(qLower) || (v.cliente||'').toLowerCase().includes(qLower) || (v.modelo||'').toLowerCase().includes(qLower));
    }
    return result;
  }, [vehicles, q, selectedEtapas, selectedVendor]);

  return (
    <div className="fade-up" style={{ display:'flex', flexDirection:'column', gap:16, height:'100%' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end' }}>
        <div><h1 style={{ fontSize:22, fontWeight:800, margin:0 }}>{title}</h1><p style={{ fontSize:12, color:COLORS.muted, margin:'4px 0 0' }}>{subtitle}</p></div>
        <button className="btn-primary" onClick={()=>setShowExportModal(true)}><Icon name="download" size={14} /> Exportar</button>
      </div>

      <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
        <input className="input" placeholder="Buscar..." value={q} onChange={e=>setQ(e.target.value)} />
        <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
          {etapasPresentes.map(e => (
            <div key={e} className={`filter-chip ${(selectedEtapas||[]).includes(e)?'active':''}`} onClick={()=>{
              setSelectedEtapas(prev => prev.includes(e) ? prev.filter(x=>x!==e) : [...prev, e]);
            }}>{e}</div>
          ))}
        </div>
      </div>

      <div className="table-container scroll-y">
        <table className="vtable" style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead><tr>{columns.filter(c=>c.default).map(c => <th key={c.key}>{c.label}</th>)}</tr></thead>
          <tbody>
            {filtered.map(v => (
              <tr key={v.os} onClick={()=>setSelected(v)}>
                {columns.filter(c=>c.default).map(c => (
                  <td key={c.key}>
                    {c.key==='etapa' ? <EtapaBadge etapa={v[c.key]} /> : (
                      c.key==='statusPecas' ? (
                        (() => {
                          const s = getConsolidatedStatus(v.os);
                          return <div onClick={(e) => { e.stopPropagation(); setSelected(v); }} style={{ display:'inline-flex', padding:'4px 8px', borderRadius:6, fontSize:9, fontWeight:800, textTransform:'uppercase', color:s.color, background:s.bg, border:`1px solid ${s.border}`, cursor:'pointer' }}>{s.label}</div>;
                        })()
                      ) : (c.key.toLowerCase().includes('data') || c.key==='prazo' ? fmtDate(v[c.key]) : (v[c.key] ?? '—'))
                    )}
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {selected && (
        <Modal title="Detalhes do Veículo" onClose={()=>setSelected(null)}>
          <div style={{ display:'flex', flexDirection:'column', gap:18 }}>
            <div style={{ fontSize:13, fontWeight:600 }}>OS: {selected.os} | {selected.cliente}</div>
            <div style={{ borderTop:`1px solid ${COLORS.border}`, paddingTop:18 }}>
              <div style={{ fontSize:12, fontWeight:800, marginBottom:12 }}>STATUS DAS PEÇAS</div>
              <PartsStatus os={selected.os} />
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

  { key:'os', label:'OS', default:true },

  { key:'cliente', label:'Cliente', default:true },

  { key:'etapa', label:'Etapa', default:true },
  { key:'statusPecas', label:'Status de Peças', default:true },

];

const COL_COMERCIAL = [
  { key:'os', label:'OS', default:true },
  { key:'modelo', label:'Modelo', default:true },
  { key:'cliente', label:'Cliente', default:true },
  { key:'etapa', label:'Status', default:true },
  { key:'statusPecas', label:'Status de Peças', default:true },
  { key:'observacoes', label:'Observações', default:true },
];

function OperacionalView({ vehicles, role }){ return <GenericTableView vehicles={vehicles} role={role} title="Visão Operacional" subtitle="Gestão da produção" columns={COL_OPERACIONAL} initialExportCols={COL_OPERACIONAL.map(c=>c.key)} />; }
function ComercialView({ vehicles, role, user }){ return <GenericTableView vehicles={vehicles} role={role} title="Visão Comercial" subtitle="Acompanhamento de vendas" columns={COL_COMERCIAL} initialExportCols={COL_COMERCIAL.map(c=>c.key)} />; }

function App(){
  const [user, setUser] = useState(() => {
    const s = localStorage.getItem('semaforo_session');
    return s ? JSON.parse(s) : null;
  });
  const [view, setView] = useState('dashboard');
  const { data:rawVehicles, loading:vLoading } = useFirestore('vehicles');
  const { data:users, loading:uLoading } = useFirestore('users');

  const role = user?.role;
  const vehicles = useMemo(() => {
    if (!user) return [];
    if (role === 'master' || role === 'operacional') return rawVehicles;
    // Filtro rigoroso por vendedor
    return rawVehicles.filter(v => String(v.vendedor||'').trim().toLowerCase() === String(user.vendedor||'').trim().toLowerCase());
  }, [rawVehicles, user, role]);

  if(!user || uLoading) return <LoginView users={users} onLogin={(u) => { setUser(u); localStorage.setItem('semaforo_session', JSON.stringify(u)); }} />;

  const NavItem = ({ id, icon, label }) => (
    <button className={`nav-item ${view===id?'active':''}`} onClick={()=>setView(id)}>
      <div className="nav-icon"><Icon name={icon} size={16} /></div>
      <span>{label}</span>
    </button>
  );

  return (
    <div style={{ display:'flex', height:'100vh', background:'#fff' }}>
      <div className="sidebar" style={{ width:260, background:COLORS.black, display:'flex', flexDirection:'column', padding:20 }}>
        <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:36 }}><Icon name="traffic-light" size={18} color="#fff" /> <div style={{ color:'#fff', fontWeight:900 }}>Semáforo</div></div>
        <div style={{ flex:1, display:'flex', flexDirection:'column', gap:6 }}>
          <NavItem id="dashboard" icon="layout-dashboard" label="Dashboard" />
          {(role === 'master' || role === 'operacional') && <NavItem id="operacional" icon="settings" label="Visão Operacional" />}
          <NavItem id="comercial" icon="briefcase" label="Visão Comercial" />
        </div>
        <button onClick={() => { setUser(null); localStorage.removeItem('semaforo_session'); }} className="nav-item" style={{ color:COLORS.red, marginTop:'auto' }}><Icon name="log-out" size={16} /> <span>Sair</span></button>
      </div>
      <div className="main-area" style={{ flex:1, padding:40, overflow:'hidden' }}>
        {vLoading ? <div>Carregando...</div> : (
          <div style={{ flex:1, display:'flex', flexDirection:'column', minHeight:0 }}>
            {view==='dashboard' && <DashboardView vehicles={vehicles} role={role} user={user} />}
            {view==='operacional' && <OperacionalView vehicles={vehicles} role={role} />}
            {view==='comercial' && <ComercialView vehicles={vehicles} role={role} user={user} />}
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
